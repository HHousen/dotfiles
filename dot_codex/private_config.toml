# Synced Codex base config.
# Codex may append local project trust and hook trust state to ~/.codex/config.toml.
# Do not re-add those local state tables to chezmoi.

approvals_reviewer = "user"
approval_policy = "on-request"
check_for_update_on_startup = false
project_root_markers = []
default_permissions = "cwd-only"

[permissions.cwd-only]
description = "Read/write only the active workspace; ask before leaving the sandbox."

[permissions.cwd-only.filesystem]
":minimal" = "read"

[permissions.cwd-only.filesystem.":workspace_roots"]
"." = "write"

[permissions.cwd-only.network]
enabled = false
